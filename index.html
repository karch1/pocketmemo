<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pocket Memo</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header>
        <h2>📝 My Pocket Memo</h2>
    </header>

    <div class="memo-form">
        <input type="text" id="titleInput" placeholder="메모 제목을 입력하세요">
        <textarea id="contentInput" rows="3" placeholder="내용을 입력하세요"></textarea>
        <button onclick="addMemo()">쪽지 남기기</button>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" oninput="filterMemos()" placeholder="🔍 제목 또는 내용으로 검색...">
    </div>

    <div class="memo-list" id="memoList"></div>

    <script src="/js/script.js"></script>
</body>
</html>
