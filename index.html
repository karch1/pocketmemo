<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pocket Memo</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="manifest" href="./manifest.json">
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>🔒 My Pocket Memo</h2>
            <p>허가된 관리자만 접근할 수 있습니다.</p>
            <button id="loginBtn" class="google-login-btn">Google 계정으로 로그인</button>
        </div>
    </div>

    <div id="mainContainer" style="display: none; width: 100%; max-width: 500px;">
        <header>
            <div class="header-flex">
                <h2>📝 My Pocket Memo</h2>
                <button id="logoutBtn" class="logout-btn">로그아웃</button>
            </div>
        </header>

        <div class="memo-form">
            <input type="text" id="titleInput" placeholder="메모 제목을 입력하세요">
            <textarea id="contentInput" rows="3" placeholder="내용을 입력하세요"></textarea>
            <button id="submitBtn">쪽지 남기기</button>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 제목 또는 내용으로 검색...">
        </div>

        <div class="memo-list" id="memoList"></div>
    </div>

    <script type="module" src="./js/script.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('서비스 워커 등록 성공!', reg))
                .catch(err => console.error('서비스 워커 등록 실패:', err));
        });
    }
</script>
</body>
</html>
